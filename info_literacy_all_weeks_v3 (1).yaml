        - "最適化：損失を小さくするように重みを少しずつ自動調整する"
        - "バックプロパゲーション（誤差逆伝播）：間違いを後ろから前に伝えて修正"
        - "流れ：予測する（前向き）→ 間違いを見つける → 原因を探る（後ろから前に）→ 重みを修正 → 繰り返す"
        - "結果：繰り返すほど精度が上がる"

    - type: points
      title: "深層学習の応用例"
