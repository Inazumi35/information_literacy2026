- num: "12"
  title: "デジタル化の基礎：メディアと数値表現"
  subtitle: "Theory 13 / pp.34-35"
  textbook: "pp.34-35"
  next_topic: "デジタル表現1：2進数 / 文字コード / 音"
  next_pages: "pp.36-43"
  summary:
    - "アナログとデジタルの違いを理解した"
    - "ビット・バイトの単位とコンピュータの情報表現の仕組みを学んだ"
    - "文字・音・画像がデジタル化される仕組みの概要を把握した"
  goals:
    - "アナログとデジタルの違い，デジタル表現の基礎を説明できる"

  slides:
    - type: title
      flow:
        - "アナログとデジタルの違い"
        - "デジタルデータの特徴"
        - "コンピュータ内の情報表現（ビットとバイト）"
        - "情報の単位と大きさ"

    - type: terms
      title: "基本用語"
      items:
        - term: "アナログデータ"
          desc: "連続的な量で表されるデータ。温度計の目盛りや音の波形など，自然界の多くがアナログ"
        - term: "デジタルデータ"
          desc: "離散的（とびとびの）数値で表されるデータ。コンピュータはすべてデジタルで扱う"
        - term: "ビット（bit）"
          desc: "情報量の最小単位。0か1の2値で表す。Binary digitの略"
        - term: "バイト（B）"
          desc: "8ビットをまとめた単位。1B = 8bit。文字や数値の記憶に使う基本単位"
        - term: "符号化"
          desc: "情報を0と1の列に変換する操作。文字・音・画像など，あらゆるデータに適用される"
    - type: twocol
      title: "アナログとデジタルの比較"
      left:
        label: "アナログ"
        items:
          - "連続した量（無限の値が存在）"
          - "例：水銀温度計，アナログ時計，LP レコード"
          - "複製・伝送のたびに劣化しやすい"
          - "自然現象はほぼアナログ"
      right:
        label: "デジタル"
        items:
          - "とびとびの値（有限の数値）"
          - "例：デジタル温度計，液晶時計，CD"
          - "複製・伝送しても品質が劣化しない"
          - "コンピュータ内部はすべてデジタル"

    - type: points
      title: "コンピュータ内の情報表現"
      items:
        - "コンピュータ内部は電圧の高低（0と1）でデータを表す"
        - "すべての情報（文字・音・画像・動画）が0と1の列に変換される"
        - "0と1への変換を「符号化（エンコード）」という"
        - "nビットで表現できる組み合わせ数は 2ⁿ 通り"
      supplement:
        - "1ビット→2通り，2ビット→4通り，3ビット→8通り，8ビット（1バイト）→256通り"

    - type: table
      title: "情報の単位と大きさ"
      headers: ["単位", "読み方", "大きさ"]
      rows:
        - ["bit", "ビット", "情報量の最小単位（0または1）"]
        - ["B", "バイト", "1B = 8bit"]
        - ["KB", "キロバイト", "1KB = 1,024B（≒ 10³ B）"]
        - ["MB", "メガバイト", "1MB = 1,024KB（≒ 10⁶ B）"]
        - ["GB", "ギガバイト", "1GB = 1,024MB（≒ 10⁹ B）"]
        - ["TB", "テラバイト", "1TB = 1,024GB（≒ 10¹² B）"]
      note: "情報の世界ではKは1,000ではなく1,024（2¹⁰）を表す（SI接頭語と区別するため大文字K）"

    - type: twocol
      title: "デジタルデータの特徴"
      left:
        label: "プラス面"
        items:
          - "劣化しない：コピー・伝送しても品質が変わらない"
          - "統合できる：文字・音・画像を同じ形式で扱える（マルチメディア）"
          - "加工が容易：編集・圧縮・暗号化を高速・正確に行える"
          - "管理しやすい：検索・整理・クラウド保存が容易"
      right:
        label: "マイナス面"
        items:
          - "微妙な情報が失われる：A/D変換時に量子化誤差が生じる"
          - "著作権侵害：劣化なくコピーできるため無断複製・拡散しやすい"
          - "情報漏洩リスク：小さなメディアに大量データを保存できるため流出しやすい"
          - "データ量の膨大化：高品質化に伴いデータ量が増大し続ける"

    - type: exercise
      title: "演習"
      basic:
        - "アナログとデジタルの違いを自分の言葉で説明せよ"
        - "1バイトは何ビットか。また，何通りの値を表せるか"
        - "3ビットで表現できる組み合わせは何通りか。全パターンを書け"
      advanced:
        - "デジタルデータのプラス面を活かした身近な例を1つ挙げ，マイナス面と合わせて考察せよ"

    - type: assignment
      task: "教科書 pp.34-35 を予習し，アナログとデジタルの例をそれぞれ2つずつノートにまとめること"

- num: "13"
  title: "デジタル表現1：2進数 / 文字コード / 音"
  subtitle: "Theory 14-17 / pp.36-43"
  textbook: "pp.36-43"
  next_topic: "デジタル表現2：画像 / 圧縮と品質"
  next_pages: "pp.44-47"
  summary:
    - "2進数・16進数の仕組みと変換方法を習得した"
    - "文字コード（ASCII・Unicode）の概念を理解した"
    - "音のデジタル化（サンプリング・量子化・符号化）の仕組みを学んだ"
  goals:
    - "2進数，文字コード，音声のデジタル化を説明できる"

  slides:
    - type: title
      flow:
        - "2進法と10進法の変換"
        - "16進法と2進法の関係"
        - "文字コードの仕組み"
        - "音のデジタル化（標本化・量子化・符号化）"

    - type: table
      title: "2進法の基本と変換例"
      headers: ["10進法", "2進法", "計算（各桁の重み：2³=8, 2²=4, 2¹=2, 2⁰=1）"]
      rows:
        - ["5",  "0101", "4×1 + 2×0 + 1×1 = 5"]
        - ["10", "1010", "8×1 + 4×0 + 2×1 + 1×0 = 10"]
        - ["13", "1101", "8×1 + 4×1 + 2×0 + 1×1 = 13"]
        - ["23", "10111", "16+4+2+1 = 23"]
      note: "10進→2進の変換：2で割り続け余りを下から読む。「1+1=10(2)」（繰り上がり）。練習：10110(2)→10進，50(10)→2進"

    - type: points
      title: "16進法"
      items:
        - "0〜9とA〜F（A=10, B=11, … F=15）の16文字で表す記数法"
        - "2進数4桁が16進数1桁に対応するため，変換が容易"
        - "例：1101 1110(2) → D E(16)（4ビットずつ区切って変換）"
        - "逆に16進→2進：各桁を4ビットの2進数に置き換える"
      supplement:
        - "プログラミングやネットワーク（MACアドレス・色コード）でよく使われる"

    - type: terms
      title: "文字コード"
      items:
        - term: "文字コード"
          desc: "文字と数値（ビット列）の対応規則。コンピュータは文字もすべて数値で管理する"
        - term: "ASCII"
          desc: "7ビットで英数字・記号を表すコード体系。ほぼすべての文字コードの基礎"
        - term: "JIS8ビットコード"
          desc: "ASCIIを拡張し，片仮名を追加した8ビット（256種）のコード体系"
        - term: "シフトJISコード"
          desc: "日本語（仮名・漢字）を16ビット（2バイト）で表すコード体系"
        - term: "ユニコード（Unicode）"
          desc: "世界中の文字を統一して扱う国際標準コード。UTF-8，UTF-16などの方式がある"
        - term: "文字化け"
          desc: "異なる文字コード体系で読み込んだときに文字が正しく表示されない現象"
    - type: points
      title: "音のデジタル化"
      items:
        - "音はアナログ（空気の連続的な振動）→ A/D変換でデジタル化"
        - "①標本化（サンプリング）：一定時間間隔で波の高さを取り出す"
        - "②量子化：取り出した値を一定の段階値に丸める"
        - "③符号化：量子化した数値を2進法で表す"
      supplement:
        - "音を特徴づける要素：振幅（音の大小）・周波数（音の高低）・波形（音色）"

    - type: points
      title: "音のデータ量計算"
      items:
        - "1秒間のデータ量 = 標本化周波数（Hz）× 量子化ビット数（bit）× チャンネル数"
        - "例：CD音質 = 44,100 Hz × 16 bit × 2ch = 1,411,200 bit/s"
        - "品質↑（標本化周波数・量子化ビット数を増やす）→ データ量↑"
        - "品質↓（値を減らす）→ データ量↓ ← トレードオフの関係"
      supplement:
        - "標本化定理：元の信号の最大周波数の2倍以上の周波数でサンプリングする必要がある"

    - type: exercise
      title: "演習"
      basic:
        - "1101(2) を10進法で表せ"
        - "23(10) を2進法で表せ"
        - "11011110(2) を16進法に変換せよ"
        - "ASCIIとユニコードの違いを説明せよ"
      advanced:
        - "標本化周波数22,050Hz，量子化16ビット，モノラル（1ch）で1分間録音したときのデータ量（バイト）を求めよ"

    - type: assignment
      task: "教科書 pp.36-43 を復習し，10進数→2進数→16進数の変換を練習すること（5問以上）。次週は画像のデジタル表現を扱う"

- num: "14"
  title: "デジタル表現2：画像 / 圧縮と品質"
  subtitle: "Theory 18-19 / pp.44-47"
  textbook: "pp.44-47"
  next_topic: "前期復習"
  next_pages: "-"
  summary:
    - "画素・解像度・階調が画質に与える影響を理解した"
    - "可逆圧縮と非可逆圧縮の違いと用途を理解した"
    - "JPEG・PNG・GIF等の画像形式の特徴と使い分けを学んだ"
  goals:
    - "画像のデジタル表現とデータ圧縮の基本的な仕組みを説明できる"

  slides:
    - type: title
      flow:
        - "画像のデジタル化（画素・解像度・階調）"
        - "画像のデータ量計算"
        - "動画のデジタル表現"
        - "データ圧縮：可逆圧縮と非可逆圧縮"

    - type: terms
      title: "基本用語"
      items:
        - term: "画素（ピクセル）"
          desc: "デジタル画像を構成する最小単位の点。画像はこの点の集合体"
        - term: "解像度"
          desc: "1インチあたりのドット数（dpi）。高いほど精細な画像になる"
        - term: "階調"
          desc: "1画素あたりに割り当てるビット数で決まる色の段階数。多いほど自然な色を表現できる"
        - term: "フレームレート（fps）"
          desc: "動画で1秒間に表示するフレーム（コマ）数。多いほど滑らかな映像になる"
        - term: "圧縮"
          desc: "一定の手順でデータ量を減らす技術。可逆圧縮と非可逆圧縮がある"
    - type: points
      title: "画像のデジタル化"
      items:
        - "①標本化：画像を画素（ピクセル）に分割し，各画素の値を取り出す"
        - "②量子化：取り出した値を段階値に変換（階調数 = 2ⁿ，n = ビット数）"
        - "③符号化：量子化した数値を2進法で表す"
        - "2値画像（1bit）・モノクロ256階調（8bit）・フルカラー（24bit = RGB各8bit）"
      supplement:
        - "フルカラー24bitは R・G・B それぞれ8ビット（256段階）× 3 = 約1677万色"

    - type: points
      title: "画像のデータ量計算"
      items:
        - "データ量（bit）= 横画素数 × 縦画素数 × 1画素あたりのビット数"
        - "バイト変換：÷ 8，KB変換：÷ 1,024"
        - "例（640×480，フルカラー24bit）：640×480×24 ÷ 8 ÷ 1,024 = 900KB"
        - "動画のデータ量 = 1枚あたりのデータ量 × フレームレート × 秒数"
      supplement:
        - "例（640×480，30fps，1分，フルカラー，無圧縮）：900KB × 30 × 60 = 1,620,000KB"

    - type: twocol
      title: "データ圧縮の種類"
      left:
        label: "可逆圧縮（lossless）"
        items:
          - "元のデータに完全に戻せる"
          - "例：ZIP，RAR，PNG，GIF"
          - "文字・プログラムなど，欠けると困るデータに使用"
          - "繰り返しパターンを省略（ランレングス圧縮など）"
      right:
        label: "非可逆圧縮（lossy）"
        items:
          - "元のデータには完全に戻せない"
          - "例：JPEG（画像），MP3（音声），MPEG（動画）"
          - "人間が知覚しにくい情報を削除して圧縮率を高める"
          - "圧縮率↑ → 品質↓ のトレードオフ"

    - type: points
      title: "各メディアの圧縮技術"
      items:
        - "音声：16,000Hz以上の高音や聞き分けにくい音を削除（MP3等）"
        - "画像：細かい色の差を間引く（JPEG）。可逆圧縮のPNG・GIFも広く使われる"
        - "動画：フレーム間の差分のみを記録し，変化のない部分を省略（MPEG等）"
        - "4K・8K映像：H.265/HEVC規格でMPEG-4の約1/2のデータ量を実現"
      supplement:
        - "圧縮率 = 圧縮後のデータ量 ÷ 元のデータ量（小さいほどよく圧縮されている）"

    - type: exercise
      title: "演習"
      basic:
        - "640×480の2値画像（1bit/画素）のデータ量を KB で求めよ（1KB=1,024B）"
        - "同じサイズのフルカラー24bit画像のデータ量を KB で求めよ"
        - "可逆圧縮と非可逆圧縮の違いを，使用場面の例を挙げて説明せよ"
      advanced:
        - "640×480，フルカラー，30fps，1分の動画（無圧縮）のデータ量を MB で求めよ。また，もしこれをJPEGで約1/10に圧縮した場合は何MBになるか"

    - type: assignment
