    - type: twocol
      title: "ローカル保存 vs クラウド保存"
      left:
        label: "ローカル保存（PC内）"
        items:
          - "高速・安定・通信不要"
          - "ネット環境に左右されない"
          - "他のPCからはアクセス不可"
          - "高専では：基本はローカル保存"
      right:
        label: "クラウド保存（OneDrive等）"
        items:
          - "どこからでもアクセス可能"
          - "常時通信・通信速度に依存"
          - "みんなで使うと学内ネットが重くなる"
          - "高専では：バックアップとして活用"

    - type: practice
      title: "PowerPointの基本操作"
      desc: "PowerPointを起動し，保存設定の変更と基本操作を体験する"
