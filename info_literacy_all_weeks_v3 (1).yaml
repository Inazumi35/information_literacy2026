# ========== 前期 ==========

---
- num: "1"
  title: "学内ネットワークと学習環境の基礎"
  subtitle: "WebClass / メール"
  textbook: "-"
  next_topic: "TeamsとFormsの基本操作"
  next_pages: "-"

  slides:
    - type: title
      flow:
        - "学内ネットワークの仕組み"
        - "アカウントの設定とログイン"
        - "WebClassの使い方"
        - "学校メールの使い方"
        - "情報セキュリティの基本"

    - type: terms
      title: "基本用語"
      items:
        - term: "ネットワーク"
          desc: "複数のコンピュータを接続し，データをやり取りする仕組み"
        - term: "アカウント"
          desc: "システムにログインするためのID（識別子）とパスワードの組み合わせ"
        - term: "WebClass"
          desc: "本校で使用するe-Learningシステム。課題提出・資料配布・連絡に使用する"
        - term: "メールアドレス"
          desc: "電子メールの送受信に使用する住所。「ユーザ名@ドメイン名」の形式"
    - type: points
      title: "学内ネットワーク環境"
      items:
        - "学内LANを通じて，インターネットや各種システムにアクセスできる"
        - "学校のシステム（WebClass・メール・Teams）には学校アカウントでログインする"
        - "共用PCでは作業終了後に必ずログアウトする"
        - "不正アクセス・なりすましは禁止されており，発覚した場合は処分の対象となる"

    - type: practice
      title: "アカウント設定とWebClassへのログイン"
      desc: "配布されたアカウント情報を使って各システムにログインする"
      steps:
        - "配布されたアカウント情報（ID・パスワード）を確認する"
        - "ブラウザからWebClassにアクセスし，IDとパスワードでログインする"
        - "ログイン後，コース一覧に「情報リテラシー」が表示されることを確認する"
        - "学校メールにログインし，受信トレイを確認する"

    - type: notice
      title: "情報セキュリティの基本"
      items:
        - "パスワードは他人に教えない・推測されやすいものにしない"
        - "共用PCでの作業後は必ずログアウトする"
        - "不審なメールのリンクや添付ファイルは開かない"
        - "学校のアカウントは学校の業務・学習目的以外に使用しない"

    - type: exercise
      title: "演習"
      basic:
        - "WebClassにログインし，情報リテラシーのコースを開いて確認テストに回答せよ"
        - "ネットワークとアカウントの違いを自分の言葉で説明せよ"
      advanced:
        - "学校メールを使って担当教員宛に「ログイン完了」の件名でメールを送信せよ"

    - type: assignment
      task: "WebClassの確認テスト（第1週）を期限までに完了すること。次週はTeamsとFormsを使うので，ログインできる状態にしておくこと"

- num: "2"
  title: "TeamsとFormsの基本操作"
  subtitle: "校内Webサービスの使い方"
  textbook: "-"
  next_topic: "情報とメディアの特性"
  next_pages: "pp.2-5"
  summary:
    - "outlook.jpの個人Microsoftアカウントを作成した"
    - "TeamsとFormsの基本操作を習得した"
    - "デジタルコミュニケーションのマナーを理解した"
  goals:
    - "Microsoft365などのWebシステムを理解し，情報発信に利用できる"

  slides:
    - type: title
      flow:
        - "個人Microsoftアカウント（outlook.jp）の作成"
        - "Microsoft Teamsの基本操作"
        - "Microsoft Formsの使い方"
        - "デジタルコミュニケーションのマナー"

    - type: terms
      title: "基本用語"
      items:
        - term: "Teams"
          desc: "Microsoft社のチームコラボレーションツール。チャット・ファイル共有・課題提出に使用"
        - term: "チャネル"
          desc: "Teams内のトピック別の会話スペース。授業ごと・グループごとに分かれている"
        - term: "Forms"
          desc: "Microsoftのアンケート・小テスト作成ツール。回答の集計が自動でできる"
        - term: "クラウド"
          desc: "インターネット上のサーバにデータを保存・共有する仕組み"
    - type: notice
      title: "なぜ個人アカウントが必要か"
      items:
        - "第6〜7週のPCセットアップでは，Microsoft 365（Office）を個人アカウントでインストールする"
        - "学校アカウントはPC卒業後に使えなくなる → 個人アカウントを今のうちに作成しておく"
        - "outlook.jpアドレスはMicrosoftの個人向け無料メールアドレス"
        - "作成したアカウントはOneDrive（クラウドストレージ）にも使える"
        - "⚠️ 作成したメールアドレスとパスワードは必ずメモしておくこと"

    - type: practice
      title: "個人Microsoftアカウント（outlook.jp）の作成"
      steps:
        - "スマートフォンのブラウザで https://signup.live.com にアクセスする"
        - "「新しいメールアドレスを取得」をタップし，好きなアドレス（例：yamada.taro.2025@outlook.jp）を入力する"
        - "パスワードを設定する（8文字以上，英字＋数字を含む）"
        - "姓名・生年月日を入力する"
        - "SMSまたはメールで届く確認コードを入力して本人確認を完了する"
        - "アカウント作成完了後，メールアドレスとパスワードをノートにメモする"

    - type: practice
      title: "Teamsの基本操作"
      desc: "Teamsにサインインし，授業チームの基本的な操作を行う"
      steps:
        - "ブラウザまたはアプリからTeamsを起動し，学校アカウントでサインインする"
        - "情報リテラシーの授業チームを開き，「一般」チャネルを確認する"
        - "チャネルに「ログイン完了しました」と投稿する"
        - "課題タブを開き，提出済み・未提出の課題を確認する"

    - type: practice
      title: "Formsの基本操作"
      desc: "担当教員が作成したFormsのアンケートに回答する"
      steps:
        - "TeamsまたはWebClassのリンクからFormsを開く"
        - "「情報リテラシー第2週 確認アンケート」に回答する"
        - "送信ボタンを押して回答を確定する"
        - "「回答が送信されました」と表示されることを確認する"

    - type: points
      title: "デジタルコミュニケーションのマナー"
      items:
        - "Teams投稿では丁寧な言葉遣いを使う（授業・学校の公式ツールであることを意識する）"
        - "メールの件名は具体的に書く（例：「質問」ではなく「第2週課題についての質問」）"
        - "返信は24時間以内を目安にする"
        - "個人情報・成績などの機密情報をチャットで送らない"
        - "既読スルーをしない・重要な連絡には必ず返信する"

    - type: exercise
      title: "演習"
      basic:
        - "outlook.jpの個人Microsoftアカウントを作成し，メールアドレスとパスワードをノートにメモせよ"
        - "Teamsの「一般」チャネルに自己紹介を投稿せよ（名前・学科・一言）"
        - "Formsの確認アンケートに回答せよ"
      advanced:
        - "TeamsとWebClassの使い分けについて，それぞれの用途の違いを述べよ"

    - type: assignment
      task: "作成したoutlook.jpのメールアドレスとパスワードをノートに記録し，紛失しないよう管理すること。第6週のPCセットアップで必ず使用する。次週から教科書を使用するので，教科書pp.2-5を事前に読んでおくこと"

- num: "3"
  title: "情報とメディアの特性"
  subtitle: "情報社会 Theory 01-02"
  textbook: "pp.2-5"
  next_topic: "課題の見つけ方と解決プロセス"
  next_pages: "pp.6-11"
  summary:
    - "データと情報の違いを理解した"
    - "情報の4つの特性（複製性・伝播性・残存性・形式性）を学んだ"
    - "情報の評価5視点で情報を批判的に読む方法を習得した"
  goals:
    - "情報や通信に関連する法令や規則，マナー・モラルの重要性を説明できる"

  slides:
    - type: title
      flow:
        - "情報とデータの違い"
        - "情報の4つの特性"
        - "情報の評価5視点"
        - "メディアの3種類"

    - type: twocol
      title: "データと情報の違い"
      left:
        label: "データ（data）"
        items:
          - "事実・観測結果をそのまま記録したもの"
          - "意味や解釈が加わっていない生の値"
          - "例：「25」「1010」「#FF0000」"
      right:
        label: "情報（information）"
        items:
          - "データに意味・解釈を加えたもの"
          - "受け手の行動や判断に影響を与える"
          - "例：「気温25℃」「10月10日」「赤色」"

    - type: terms
      title: "情報の4つの特性"
      items:
        - term: "複製性"
          desc: "コストをかけずに同じ情報を大量に複製できる（物理的なモノとの大きな違い）"
        - term: "伝播性"
          desc: "情報は瞬時に広範囲に広がる。一度発信した情報は回収が難しい"
        - term: "残存性"
          desc: "デジタル情報は削除しても完全には消えない（デジタルタトゥー）"
        - term: "形式性"
          desc: "情報は形式（文字・画像・音声・動画等）によって伝わりやすさが変わる"
    - type: points
      title: "情報の評価5視点"
      items:
        - "正確性（Accuracy）：情報は正しいか，誤りや誇張はないか"
        - "網羅性（Coverage）：必要な情報が十分に含まれているか"
        - "客観性（Objectivity）：特定の立場・意見に偏っていないか"
        - "最新性（Currency）：情報は最新か，古くなっていないか"
        - "出典明示性（Authority）：情報の出所・作成者が明確か"
      supplement:
        - "SNSやWebの情報は，この5視点で批判的に評価することが重要（情報リテラシー）"

    - type: terms
      title: "メディアの3種類"
      items:
        - term: "表現メディア"
          desc: "情報を表現するための形式。文字・音声・静止画・動画・アニメーション等"
        - term: "伝達メディア"
          desc: "情報を伝えるための手段・媒体。インターネット・電話・テレビ・新聞等"
        - term: "記録メディア"
          desc: "情報を保存するための媒体。HDD・SSD・USB・CD/DVD・クラウド等"
    - type: table
      title: "伝達メディアの特徴比較"
      headers: ["メディア", "速度", "範囲", "双方向性", "記録性"]
      rows:
        - ["インターネット", "高速", "世界規模", "あり", "あり"]
        - ["テレビ・ラジオ", "リアルタイム", "放送エリア", "なし", "限定的"]
        - ["新聞・雑誌", "低速（発行日）", "配布エリア", "なし", "あり"]
        - ["電話", "リアルタイム", "通信可能エリア", "あり", "なし"]

    - type: exercise
      title: "演習"
      basic:
        - "情報の4つの特性をそれぞれ具体例を挙げて説明せよ"
        - "表現メディア・伝達メディア・記録メディアの違いを説明し，それぞれ1つずつ例を挙げよ"
      advanced:
        - "SNSで見かけた情報を，情報の評価5視点を使って分析し，信頼性を判断する方法を述べよ"

    - type: assignment
      task: "教科書pp.2-5を復習すること。次週は課題発見・解決プロセスを学ぶ（pp.6-11）"

- num: "4"
  title: "課題の見つけ方と解決プロセス"
  subtitle: "情報社会 Theory 03-05"
  textbook: "pp.6-11"
  next_topic: "知的財産と個人情報の基礎"
  next_pages: "pp.12-15"
  summary:
    - "問題と課題の違いを理解した"
    - "問題解決の5ステップとPDCAサイクルを学んだ"
    - "ブレーンストーミングとKJ法の情報分析手法を習得した"
  goals:
    - "問題解決の基本的なプロセスを説明できる"

  slides:
    - type: title
      flow:
        - "問題と課題の違い"
        - "問題解決の5ステップ"
        - "PDCAサイクル"
        - "情報収集と分析の手法"

    - type: terms
      title: "基本用語"
      items:
        - term: "問題（Problem）"
          desc: "現状と理想の状態のギャップ。「あるべき姿」と「現状」の差"
        - term: "課題（Task）"
          desc: "問題を解決するために取り組むべき具体的な行動・テーマ"
        - term: "フィードバック"
          desc: "結果を評価し，次の行動に活かすこと。PDCAの「C・A」に相当"
        - term: "データマイニング"
          desc: "大量のデータから有用なパターンや知識を発見する手法"
    - type: points
      title: "問題解決の5ステップ"
      items:
        - "① 問題の発見：現状と理想のギャップを明確にする"
        - "② 情報の収集：問題に関連するデータ・事例・意見を集める"
        - "③ 情報の分析：収集した情報を整理・比較・評価する"
        - "④ 解決策の設計：分析結果をもとに具体的な解決策を考える"
        - "⑤ 実施と評価：解決策を実行し，結果を評価してフィードバックする"

    - type: points
      title: "PDCAサイクル"
      items:
        - "Plan（計画）：目標を設定し，達成するための計画を立てる"
        - "Do（実行）：計画に従って実際に行動する"
        - "Check（評価）：実行結果を目標と比較して評価する"
        - "Act（改善）：評価結果をもとに計画・行動を改善する"
      supplement:
        - "PDCAは1回で終わらず，繰り返すことで継続的に改善していく仕組み"

    - type: points
      title: "情報収集の方法と注意点"
      items:
        - "一次情報（自分で収集）：アンケート・観察・実験・インタビュー"
        - "二次情報（既存のデータ）：書籍・論文・統計・Webサイト"
        - "複数の情報源を比較し，信頼性を確認する（評価5視点を活用）"
        - "出典を必ず記録する（後で検証・引用できるように）"

    - type: twocol
      title: "情報分析の手法"
      left:
        label: "ブレーンストーミング"
        items:
          - "アイデアを自由に出し合う発散的思考法"
          - "ルール：批判しない・量を重視・便乗OK"
          - "多くのアイデアを短時間で生み出せる"
          - "KJ法などで整理することが多い"
      right:
        label: "KJ法"
        items:
          - "情報をカードに書き，グループ化して整理する手法"
          - "類似するアイデアをまとめて全体像を把握する"
          - "収束的思考法（アイデアを絞り込む）"
          - "ブレーンストーミングの後に使うと効果的"

    - type: exercise
      title: "演習"
      basic:
        - "PDCAサイクルの各ステップを説明し，学習に応用する例を挙げよ"
        - "ブレーンストーミングとKJ法の違いを説明せよ"
      advanced:
        - "「授業の遅刻を減らす」という問題を設定し，問題解決の5ステップに沿って解決策を考えよ"

    - type: assignment
      task: "教科書pp.6-11を復習すること。次週は知的財産と個人情報を学ぶ（pp.12-15）"

- num: "5"
  title: "知的財産と個人情報の基礎"
  subtitle: "情報社会 Theory 06-07"
  textbook: "pp.12-15"
  next_topic: "PCの設定1：基本設定とネットワーク設定"
  next_pages: "-"
  summary:
    - "著作権・特許権・商標権など知的財産権の種類を理解した"
    - "引用のルールと著作権上の許可・禁止事項を理解した"
    - "個人情報の定義と適切な取り扱いを学んだ"
  goals:
    - "知的財産権（著作権等）と個人情報保護の基本的な考え方を説明できる"

  slides:
    - type: title
      flow:
        - "知的財産権の種類と仕組み"
        - "著作権：何がOKで何がNGか"
        - "個人情報の定義と保護"

    - type: terms
      title: "知的財産権の種類"
      items:
        - term: "著作権"
          desc: "文章・音楽・画像・プログラム等の創作物を保護する権利。創作と同時に自動的に発生する"
        - term: "特許権"
          desc: "新しい発明を保護する権利。特許庁への出願・審査が必要（保護期間20年）"
        - term: "商標権"
          desc: "商品・サービスのブランド名やロゴを保護する権利。登録が必要"
        - term: "意匠権"
          desc: "製品のデザイン（外観）を保護する権利。登録が必要"
    - type: twocol
      title: "著作権：やっていいこと・いけないこと"
      left:
        label: "許可されること（例）"
        items:
          - "私的使用のための複製（自分だけが使う場合）"
          - "適切な引用（出典を明記し，引用部分が従）"
          - "教育機関での一定の利用（授業目的等）"
          - "パロディ（批評・風刺目的で改変）※条件あり"
      right:
        label: "禁止されること（例）"
        items:
          - "他人の文章・画像を無断でWebに転載する"
          - "音楽・動画を無断でコピーして配布する"
          - "出典を示さずに他人の文章を自分の文章として使う（剽窃）"
          - "著作物を無断で改変して公開する"

    - type: points
      title: "引用のルール"
      items:
        - "引用する必然性がある（引用なしでは説明できない）"
        - "引用部分と自分の文章が明確に区別されている"
        - "引用部分は従，自分の文章が主であること"
        - "出典（著者名・書籍名・URL・参照日）を明記する"
      supplement:
        - "レポート・スライドでWebの画像や文章を使う際は必ず出典を記載すること"

    - type: terms
      title: "個人情報の基礎"
      items:
        - term: "個人情報"
          desc: "生存する個人を特定できる情報。氏名・住所・生年月日・電話番号・顔写真等"
        - term: "個人情報保護法"
          desc: "個人情報の適切な取り扱いを定めた法律。企業・機関の義務を規定する"
        - term: "プライバシー"
          desc: "他人に知られたくない個人の情報・私生活を守る権利"
        - term: "マイナンバー"
          desc: "日本国内の全住民に割り当てられた12桁の個人識別番号"
    - type: notice
      title: "個人情報の取り扱い上の注意"
      items:
        - "SNSに氏名・住所・学校名・顔写真を公開する際は慎重に判断する"
        - "他人の個人情報を本人の同意なく第三者に伝えてはいけない"
        - "パスワード・学籍番号などの認証情報は個人情報として厳重に管理する"
        - "フィッシングサイトに個人情報を入力しない（URLを必ず確認する）"

    - type: exercise
      title: "演習"
      basic:
        - "著作権・特許権・商標権の違いを説明せよ"
        - "レポートで他者の文章を引用する際に守るべきルールを3つ挙げよ"
      advanced:
