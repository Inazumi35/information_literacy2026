        - "データ：野球選手40人分の成績データ（架空）。セ・リーグ20人，パ・リーグ20人"
        - "項目：選手名・リーグ・打率・本塁打・打点・安打・出塁率"
        - "検証方法1：散布図で視覚的に確認"
