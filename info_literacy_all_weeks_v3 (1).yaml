- num: "後期2"
  title: "処理の仕組み（CPU・命令・論理回路）"
  subtitle: "Theory 29-30 / pp.74-77"
  textbook: "pp.74-77"
  next_topic: "アルゴリズムと効率（表現方法と計算量の基礎）"
  next_pages: "pp.78-81"
  summary:
    - "ノイマン型コンピュータの五大装置とCPUの処理手順を理解した"
    - "論理回路（AND・OR・NOT）と半加算器の仕組みを学んだ"
    - "クロック周波数とコア数がCPU性能に与える影響を把握した"
  goals:
    - "CPUの基本的な動作原理と論理回路の役割を説明できる"

  slides:
    - type: title
      flow:
        - "ノイマン型コンピュータと五大装置"
        - "計算の手順（フェッチ・デコード・実行）"
        - "CPUの処理能力（クロック周波数）"
        - "論理回路（AND・OR・NOT）"
        - "半加算器"

    - type: terms
      title: "基本用語"
      items:
        - term: "ノイマン型コンピュータ"
          desc: "記憶装置にプログラムの命令をデータとして格納し，順次読み込んで実行する逐次処理方式のコンピュータ。ジョン・フォン・ノイマンが提唱"
        - term: "CPU（Central Processing Unit）"
          desc: "中央演算処理装置。演算装置と制御装置から構成され，コンピュータの中心的な処理を担う"
        - term: "主記憶装置"
          desc: "CPUから直接アクセスできる記憶装置。メモリともいう"
        - term: "補助記憶装置"
          desc: "主記憶装置以外の記憶装置。ストレージともいう（HDD・SSD等）"
        - term: "バス（bus）"
          desc: "コンピュータ内の各装置・周辺装置間をつなぐデータの通路"
        - term: "クロック周波数"
          desc: "CPUが1秒間に動作する回数。CPUの処理速度を表す尺度の1つ（単位：Hz）"
    - type: points
      title: "コンピュータの五大装置"
      items:
        - "演算装置：データの計算を行う"
        - "制御装置：プログラムの実行や各装置の制御を行う"
        - "記憶装置：プログラムやデータを記憶する（主記憶・補助記憶）"
        - "入力装置：外部からデータを取り込む"
        - "出力装置：外部へデータを出力する"
      supplement:
        - "CPUは演算装置と制御装置をまとめたもの。これら五大装置をバスで接続する"

    - type: points
      title: "計算の手順（ノイマン型の動作）"
      items:
        - "① プログラムの実行が指示されると，命令やデータが主記憶装置に転送される"
        - "② 制御装置がプログラムカウンタの指すアドレスから命令を読み込み，カウンタを1つ進める"
        - "③ 読み込んだ命令を制御装置で解釈し，演算・転送・格納・終了などの動作を行う"
        - "④ 終了命令がない限り，手順②へ戻る"
      supplement:
        - "この繰り返しにより主記憶装置の状態が逐次変化し，コンピュータの計算が行われる"

    - type: table
      title: "CPUのクロック周波数"
      headers: ["クロック周波数", "1クロックの時間", "1秒間の動作回数"]
      rows:
        - ["1 Hz", "1秒", "1回"]
        - ["1 MHz", "1マイクロ秒（10⁻⁶秒）", "100万回"]
        - ["1 GHz", "1ナノ秒（10⁻⁹秒）", "10億回"]
        - ["3 GHz", "約0.33ナノ秒", "30億回"]
      note: "一般に同種のCPUではクロック周波数が高いほど単位時間あたりの計算回数が多い。近年はマルチコアで複数処理を並行して行う技術も普及"

    - type: terms
      title: "論理回路の基礎"
      items:
        - term: "論理回路"
          desc: "0と1（電気信号のON/OFF）を入力として，論理演算の結果を出力する電子回路"
        - term: "集積回路（IC）"
          desc: "複数の論理回路を組み合わせてまとめたもの。コンピュータの中枢を構成する"
        - term: "真理値表"
          desc: "論理回路の入力と出力の全組み合わせを表にしたもの"
    - type: table
      title: "基本論理回路の真理値表"
      headers: ["回路", "入力①", "入力②", "出力", "説明"]
      rows:
        - ["AND", "0", "0", "0", "入力が全て1のときだけ出力が1"]
        - ["AND", "0", "1", "0", ""]
        - ["AND", "1", "0", "0", ""]
        - ["AND", "1", "1", "1", ""]
        - ["OR", "0", "0", "0", "入力のどれか1つでも1なら出力が1"]
        - ["OR", "0", "1", "1", ""]
        - ["OR", "1", "0", "1", ""]
        - ["OR", "1", "1", "1", ""]
        - ["NOT", "0", "-", "1", "入力と反対の結果を出力する"]
        - ["NOT", "1", "-", "0", ""]

    - type: points
      title: "半加算器"
      items:
        - "2進法1桁の2つの数AとBを加算し，1桁目をS（Sum），桁上がりをC（Carry）として出力する論理回路"
        - "S = A XOR B（AとBが異なるとき1）"
        - "C = A AND B（両方1のときだけ1）"
        - "半加算器を2つ組み合わせると「全加算器」（下位からの桁上がりを考慮）が作れる"
      supplement:
        - "AND・OR・NOT の3つの基本論理回路を「基本論理回路」という。これらの組み合わせであらゆる処理が実現される"

    - type: exercise
      title: "演習"
      basic:
        - "ノイマン型コンピュータの五大装置をそれぞれ説明せよ"
        - "AND・OR・NOT回路の真理値表を完成させよ（入力2つ，全パターン）"
        - "クロック周波数2GHzのCPUが1秒間に動作する回数を求めよ"
      advanced:
        - "半加算器の真理値表を書き，AND・OR・NOT回路の組み合わせで実現できることを説明せよ"

    - type: assignment
      task: "教科書 pp.74-77 を復習すること。次週はアルゴリズムと効率を学ぶ（pp.78-81）"

