# ===== 後期7週 =====
- num: "後期7"
  title: "データベースとデータ管理の基礎"
  subtitle: "Theory 47-48 / pp.118-121"
  textbook: "pp.118-121"
  next_topic: "データサイエンス・AI（1）：導入"
  next_pages: "-"
  summary:
    - "関係データベースのテーブル・行・列・主キーの概念を理解した"
    - "射影・選択・結合の関係論理演算を学んだ"
    - "SQLの基本的な命令（SELECT・WHERE・JOIN）を習得した"
  goals:
    - "データベースの意義と概要について説明できる"

  slides:
    - type: title
      flow:
        - "ビッグデータとデータが活用される社会"
        - "データベースとDBMS"
        - "関係データベース（テーブル・行・列・主キー）"
        - "関係論理演算（射影・選択・結合）"
        - "SQLの基礎"

    - type: terms
      title: "基本用語"
      items:
        - term: "ビッグデータ（big data）"
          desc: "コンピュータやネットワークの発達により収集・蓄積されるようになった大量のデータ。閲覧・投稿履歴，位置情報，購入履歴，POSデータ，個人情報，生体データ，監視映像，環境データ，運行状況など"
        - term: "データベース（DB）"
          desc: "特定の目的のために整理・管理されたデータの集合体。必要なデータを素早く取り出したり，追加・削除・更新したりすることができる"
        - term: "DBMS（Database Management System）"
          desc: "データベース管理システム。データベースを管理・操作するためのソフトウェア"
        - term: "関係データベース（relational database）"
          desc: "データを表（テーブル）の形式で管理するデータベース。現在最も広く使われている"
    - type: twocol
      title: "関係データベースの構造"
      left:
        label: "テーブルの要素"
        items:
          - "テーブル（表）：データをまとめる入れ物"
          - "行（レコード）：1件分のデータ"
          - "列（フィールド）：データの属性（項目）"
          - "主キー：各行を一意に識別する列（重複なし・空欄なし）"
          - "外部キー：他のテーブルの主キーを参照する列"
      right:
        label: "書籍テーブルの例"
        items:
          - "図書番号 | 名前 | 著者名 | 出版社 | 分類記号"
          - "100070408 | パスワード盗りの鑑 | 松原秀行 | A社 | 913"
          - "100020411 | 確信の少年 | あさのあつこ | B社 | 913"
          - "100108216 | そのときは彼によろしく | 市川拓司 | C社 | 913"
          - "（主キー：図書番号）"

    - type: points
      title: "関係論理演算の3種類"
      items:
        - "■射影演算：表からいくつかの項目を取り出して新たな表を生成する（列の抽出）"
        - "　例：SELECT 書名, 著者名, 出版社 FROM 書籍表"
        - "■選択演算：条件を満たすデータだけを抽出して新たな表を生成する（行の抽出）"
        - "　例：SELECT * FROM 書籍表 WHERE 出版社 = 'C社'"
        - "■結合演算：複数の表をある項目どうしの関係に基づいて結合し，新たな表を生成する"
        - "　例：SELECT * FROM 書籍表, NDC分類表 WHERE 書籍表.分類記号 = NDC分類表.分類記号"
      supplement:
        - "これらの関係論理演算を記述するのに問い合わせ言語が用いられる。代表的な問い合わせ言語にSQLがある"

    - type: points
      title: "SQLの基本文法"
      items:
        - "検索（SELECT）：SELECT 列名 FROM テーブル名 WHERE 条件"
        - "追加（INSERT）：INSERT INTO テーブル名 VALUES (値1, 値2, …)"
        - "更新（UPDATE）：UPDATE テーブル名 SET 列名 = 値 WHERE 条件"
        - "削除（DELETE）：DELETE FROM テーブル名 WHERE 条件"
      supplement:
        - "SQLはStructured Query Languageの略。関係データベースを操作するための標準的な問い合わせ言語"

    - type: points
      title: "データベースの設計（正規化）"
      items:
        - "データベースは，データの重複や矛盾が起きないよう設計する必要がある"
        - "正規化：データの重複を排除し，整合性を保ちやすい形にテーブルを分割・整理する作業"
        - "例：書籍テーブルと分類テーブルを分けることで，分類名の変更が1か所で済む"
        - "テーブルを分けすぎると結合演算（JOIN）が増えるため，バランスが重要"
      supplement:
        - "予約システム（鉄道の座席予約など）は，データベースとネットワークが連携し，利用者の要望に瞬時に対応できるようになっている"

    - type: table
      title: "ファイル管理 vs データベース管理"
      headers: ["項目", "ファイル管理（Excel等）", "データベース管理"]
      rows:
        - ["同時利用", "困難（上書き衝突）", "可能（排他制御）"]
        - ["データの重複", "起こりやすい", "正規化で抑制できる"]
        - ["検索速度", "データ量が増えると遅くなる", "大量データでも高速"]
        - ["セキュリティ", "制限が難しい", "アクセス権限を細かく設定できる"]
        - ["整合性", "手動管理", "自動的に保たれる"]

    - type: exercise
      title: "演習"
      basic:
        - "関係データベースのテーブル・行・列・主キーをそれぞれ説明せよ"
        - "射影・選択・結合の違いを，「書籍テーブルからC社の本の書名と著者名だけを取り出す」操作を例に説明せよ"
        - "次のSQLが取り出すデータを説明せよ：SELECT 書名, 著者名 FROM 書籍表 WHERE 出版社 = 'A社'"
      advanced:
        - "学校の図書管理システムを設計し，必要なテーブルとその列・主キーを書け。また，「2024年以降に出版された機械工学の本の書名と著者名」を検索するSQLを書け"

    - type: assignment
      task: "教科書 pp.118-121 を復習すること。次週からデータサイエンスとAIの基礎を学ぶ。身近なAI活用の事例（画像認識・音声認識・推薦システム等）を1つ調べてくること"

