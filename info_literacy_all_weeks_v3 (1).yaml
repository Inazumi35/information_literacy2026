      rows:
        - ["正解率（Accuracy）", "全体で何%正解したか", "正解数 ÷ 全体の数", "全体の性能"]
        - ["適合率（Precision）", "「この数字だ」と予測したとき，実際に正しい割合", "正しく予測した数 ÷ その数字だと予測した全体", "予測の信頼性（間違った予測の少なさ）"]
        - ["再現率（Recall）", "実際のその数字を，どれだけ正しく見つけられたか", "正しく予測した数 ÷ 実際のその数字の数", "見逃しの少なさ"]
        - ["混同行列（Confusion Matrix）", "どの数字をどの数字と間違えたか", "行：実際の数字，列：予測した数字", "間違いのパターン"]
      note: "例（数字7）：適合率 = 1000÷1050 = 95.2%，再現率 = 1000÷1028 = 97.3%"

    - type: twocol
      title: "適合率と再現率のトレードオフ"
      left:
        label: "適合率（Precision）重視"
        items:
          - "予測した側から見る"
          - "「病気だ」と診断したら確実に病気"
          - "誤診を減らしたい場面"
          - "適合率を上げると再現率が下がる"
      right:
        label: "再現率（Recall）重視"
        items:
          - "実際の側から見る"
          - "病気の人を見逃さない"
          - "見落としが致命的な場面（がん検診など）"
          - "再現率を上げると適合率が下がる"
      supplement:
        - "👉 何を重視するかは用途によって異なる。両方のバランスを取る指標としてF1スコアがある"

    - type: twocol
      title: "過学習と未学習"
      left:
        label: "過学習（Overfitting）"
        items:
          - "訓練データに合わせすぎた状態"
          - "訓練データ99%正解，テストデータ70%正解"
          - "新しいデータで性能が落ちる"
          - "原因：モデルが複雑すぎる・データが少ない"
      right:
        label: "未学習（Underfitting）"
        items:
          - "学習が不足した状態"
          - "訓練データ70%正解，テストデータ68%正解"
          - "そもそも性能が低い"
          - "原因：モデルが単純すぎる・学習が不足"
      supplement:
        - "第12回のMNISTは：訓練データ約99%，テストデータ約98% → 良いモデル（過学習していない）"

    - type: practice
      title: "Colab実習：MNISTモデルの評価"
      steps:
        - "Part 1：第12回の復習 → MNISTモデルの学習を実行"
        - "Part 2：評価指標の計算 → 正解率・適合率・再現率・混同行列を確認"
        - "「7」を「1」と間違えやすい，「7」を「8」と間違えやすい，などのパターンを発見する"

    - type: exercise
      title: "演習（後期後半まとめ）"
      basic:
        - "正解率・適合率・再現率の違いを説明せよ"
        - "「がん検診AI」を開発するとき，適合率と再現率のどちらを重視すべきか。理由も述べよ"
        - "過学習とはどのような状態か。なぜ問題なのか説明せよ"
      advanced:
        - "第8〜14回を振り返り，データサイエンスとAIの技術が機械工学にどのように応用できるか，具体的な場面を1つ考えて述べよ"

    - type: assignment
      task: "次週は後期全範囲の復習。第8〜14回のハンドアウトと教科書pp.104-129を見直しておくこと"
