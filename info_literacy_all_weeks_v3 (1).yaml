        - term: "相関係数"
          desc: "相関の強さを数値化（-1〜+1）。今日のデータでは約0.7前後 → 比較的高い正の相関"
        - term: "注意"
          desc: "相関 ≠ 因果。相関が高くても「打率が本塁打を増やしている」とは断定できない。体格・スイング・戦術など他の要因が関係する可能性がある"

    - type: points
      title: "線形回帰と予測"
      items:
        - "線形回帰：散布図に「最も当てはまる直線（回帰直線）」を引く方法"
        - "数式：y = ax + b（x：説明変数（打率），y：目的変数（本塁打），a：傾き，b：切片）"
        - "決定係数（R²）：今回のデータでは約0.5〜0.6 → モデルが説明できるのは約半分程度"
        - "予測例：打率.300の選手 → 約15〜20本程度／打率.250の選手 → 約10〜15本程度"
        - "外れ値：打率低いのに本塁打多い選手，打率高いのに本塁打少ない選手 → 例外の発見につながる"

    - type: twocol
      title: "訓練データとテストデータ"
      left:
        label: "なぜ分けるのか"
        items:
          - "モデルが未知のデータでも予測できるか確認するため"
          - "訓練データだけで評価すると，暗記しているだけの可能性がある"
          - "汎化性能（未知データへの対応力）を確認することが重要"
      right:
        label: "分け方"
        items:
          - "訓練データ（60%）：モデルの学習に使う。このデータでパラメータを決める"
          - "テストデータ（40%）：モデルの評価に使う。未知のデータとして扱う"
          - "流れ：訓練データで学習 → テストデータで評価 → 汎化性能を確認"

    - type: twocol
      title: "相関関係と因果関係・擬似相関"
      left:
        label: "相関関係と因果関係"
        items:
          - "相関関係：一方が増加すると他方が増加または減少する関係"
          - "因果関係：一方が原因となり他方が結果となる関係"
          - "因果関係の3規準：①共変性（相関あり）②時間的順序③交絡因子の排除"
          - "相関があっても因果関係があるとは限らない"
      right:
        label: "擬似相関（見かけの相関）"
        items:
          - "例：アイスの売上↑の月は水難事故↑ → 散布図で相関がある"
          - "しかしアイスが水難事故を引き起こすわけではない"
          - "交絡因子（気温）が両方に作用しているため"
          - "→ これを擬似相関という"

    - type: practice
      title: "Colab実習：野球データの分析"
      steps:
        - "Teamsの課題からリンクをクリック"
        - "「baseball_data.csv」を自分のマイドライブにコピー"
        - "セル1を実行（Googleドライブへのアクセス許可）"
        - "セル2〜6を順番に実行"
        - "実行順序：①データ読み込み→②散布図→③相関係数→④train/test分割→⑤線形回帰→⑥予測と可視化"
      note: "提出物：Wordファイル1つ（セル6の実行結果スクリーンショット＋外れ値が出た理由1行）"
    - type: assignment
      task: "WordファイルにスクリーンショットとコメントをまとめてTeamsに提出すること"

