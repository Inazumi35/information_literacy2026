  summary:
    - "Excelでデータ入力・グラフ作成・統計関数を使えるようになった"
    - "尺度水準（名義・順序・間隔・比例）によるデータの種類を理解した"
    - "相関分析の意味とExcelでの実施方法を習得した"
  goals:
    - "表計算ソフトでデータの整理・集計・グラフ可視化ができる"

  slides:
    - type: title
      flow:
        - "データの取得と操作"
        - "データの可視化（グラフ）"
        - "尺度水準とデータの種類"
        - "記述統計と相関分析"

    - type: points
      title: "データの取得と操作"
      items:
        - "手動入力：直接セルに入力する基本的な方法"
        - "CSVファイル読み込み：「データ」→「テキストまたはCSVから」"
        - "オープンデータ：e-Stat（政府統計）・気象庁・国土地理院等を活用"
        - "データ整形：不要な行・列の削除，データ型の変換，欠損値の処理"
        - "並べ替え：「データ」タブ→「昇順」または「降順」"
      supplement:
        - "オープンデータとは：政府・公的機関が無償で公開しているデータ。誰でも自由に利用できる"

    - type: table
      title: "グラフの種類と用途"
      headers: ["グラフの種類", "用途", "例"]
      rows:
        - ["棒グラフ", "カテゴリ別の比較", "都市別の人口比較"]
        - ["折れ線グラフ", "時系列の変化", "月別の気温変化"]
        - ["円グラフ", "全体に占める割合", "予算の内訳"]
        - ["散布図", "2つの変数の関係", "身長と体重の関係"]
        - ["ヒストグラム", "データの分布", "テストの点数分布"]

    - type: table
      title: "尺度水準（データの種類）"
      headers: ["尺度", "特徴", "例", "使える統計"]
      rows:
        - ["名義尺度", "分類・区別のラベル", "性別・血液型", "度数・最頻値"]
        - ["順序尺度", "順序に意味・間隔は不等", "成績（優・良・可）", "中央値"]
        - ["間隔尺度", "間隔が等しい・ゼロ点なし", "気温（℃）", "平均値・標準偏差"]
        - ["比例尺度", "間隔が等しい・ゼロ点あり", "身長・体重・金額", "すべて可能"]

    - type: points
      title: "記述統計：Excelの統計関数"
      items:
        - "平均値（mean）：=AVERAGE(A2:A10)　データの合計÷個数"
        - "中央値（median）：=MEDIAN(A2:A10)　データを並べたときの中央の値"
        - "最頻値（mode）：=MODE.SNGL(A2:A10)　最も頻繁に現れる値"
        - "標準偏差（SD）：=STDEV.S(A2:A10)　データの散らばりの程度"
        - "最大値・最小値：=MAX(A2:A10) / =MIN(A2:A10)"
      supplement:
        - "範囲（range）= 最大値－最小値　　分散（variance）= 標準偏差の2乗"

    - type: twocol
      title: "相関分析"
      left:
        label: "相関係数の見方"
        items:
          - "範囲：-1から+1"
          - "+1に近い：強い正の相関（両方増える）"
          - "-1に近い：強い負の相関（片方増えると片方減る）"
          - "0に近い：相関なし"
      right:
        label: "Excelでの操作"
        items:
          - "CORREL関数：=CORREL(範囲1, 範囲2)"
          - "散布図：「挿入」→「散布図」"
          - "近似曲線を追加して傾向を確認"
          - "注意：相関関係≠因果関係"

    - type: exercise
      title: "演習"
      basic:
        - "テストの成績データ（85,72,90,68,88,95,78,82,70,92）の平均値・中央値・最大値・最小値・標準偏差をExcelで求めよ"
        - "棒グラフ・折れ線グラフ・散布図の用途の違いを説明せよ"
      advanced:
        - "確率統計と線形代数の成績データをExcelに入力し，散布図を作成して相関係数を求め，Teamsに提出せよ"

    - type: assignment
      task: "演習3の散布図（確率統計と線形代数の成績）をTeamsの課題から提出すること"

- num: "10"
  title: "情報セキュリティと情報モラル"
  subtitle: "情報社会 Theory 08-09"
  textbook: "pp.16-19"
  next_topic: "情報社会：技術の進歩と私たちの役割"
  next_pages: "pp.20-23"
  summary:
    - "情報セキュリティの3要素（CIA）と主な脅威の種類を理解した"
    - "安全なパスワード管理と二段階認証の重要性を学んだ"
    - "ネット上の行動と法的責任の関係を理解した"
  goals:
    - "情報セキュリティの必要性を理解し，基本的な対策を説明できる"

  slides:
    - type: title
      flow:
        - "情報セキュリティの3要素（CIA）"
        - "主な脅威と攻撃手法"
        - "情報モラルと個人の責任"
        - "ネット上の行動と法的責任"

    - type: terms
      title: "情報セキュリティの3要素（CIA）"
      items:
        - term: "機密性（Confidentiality）"
          desc: "許可された人だけが情報にアクセスできる状態を保つ"
        - term: "完全性（Integrity）"
          desc: "情報が正確で改ざんされていない状態を保つ"
        - term: "可用性（Availability）"
          desc: "必要なときに情報やシステムを使える状態を保つ"
    - type: table
      title: "主な脅威の種類"
      headers: ["脅威", "内容", "身近な例"]
      rows:
        - ["マルウェア", "不正なソフトウェアの総称", "ウイルス・ランサムウェア・スパイウェア"]
        - ["フィッシング", "偽サイト・偽メールで情報を騙し取る", "銀行・宅配業者を装ったメール"]
        - ["不正アクセス", "他人のアカウントに無断でログイン", "パスワード流出による乗っ取り"]
        - ["ソーシャルエンジニアリング", "人の心理を利用して情報を入手", "電話・なりすましで聞き出す"]
        - ["DoS攻撃", "大量データを送りサービスを停止させる", "ゲームサーバー・ECサイトへの攻撃"]

    - type: twocol
      title: "パスワードの安全な管理"
      left:
        label: "やってはいけないこと"
        items:
          - "短い・単純なパスワードを使う（例：123456）"
          - "複数のサービスで同じパスワードを使う"
          - "パスワードをメモに書いて貼る"
          - "他人に教える・LINE等で送る"
      right:
        label: "推奨される対策"
        items:
          - "12文字以上・英数字・記号を混在させる"
          - "サービスごとに異なるパスワードを使う"
          - "パスワードマネージャーを活用する"
          - "二段階認証（2FA）を設定する"

    - type: terms
      title: "情報モラルの基本用語"
      items:
        - term: "情報モラル"
          desc: "情報社会で適切に行動するための倫理観・判断力・行動力"
        - term: "デジタルタトゥー"
          desc: "一度インターネットに公開した情報は完全に消去できないこと"
        - term: "フェイクニュース"
          desc: "意図的に作られた虚偽の情報。SNSで急速に拡散されやすい"
        - term: "VDT症候群"
          desc: "長時間のPC・スマホ使用による目・肩・腰などの身体的不調"
        - term: "ネット依存"
          desc: "インターネットの過剰使用により日常生活に支障をきたす状態"
    - type: notice
      title: "ネット上での行動と法的責任"
      items:
        - "匿名であっても発信者の特定は技術的に可能（IPアドレス・ログの追跡）"
        - "誹謗中傷・脅迫は名誉毀損罪・侮辱罪・脅迫罪に該当しうる"
        - "他人の著作物の無断転載は著作権法違反"
        - "不正アクセスは不正アクセス禁止法違反（未成年でも適用される）"
      supplement:
        - "「バレないだろう」という意識が最大のリスク。オンラインとオフラインで行動基準を変えない"

    - type: exercise
      title: "演習"
      basic:
        - "情報セキュリティの3要素（CIA）をそれぞれ説明せよ"
        - "フィッシング詐欺とはどのような攻撃か説明せよ"
        - "デジタルタトゥーとは何か，具体例を挙げて説明せよ"
      advanced:
        - "自分のSNSアカウントのセキュリティ設定を確認し，改善すべき点と理由を述べよ"

