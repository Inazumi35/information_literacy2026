    - "線形探索・二分探索・バブルソートの仕組みと効率を学んだ"
  goals:
    - "基礎的なアルゴリズムを理解し，複数の解き方があることを説明できる"

  slides:
    - type: title
      flow:
        - "アルゴリズムとは"
        - "制御構造（順次・分岐・反復）"
        - "フローチャートによる表現"
        - "探索アルゴリズム（線形・二分）"
        - "整列アルゴリズム"

    - type: terms
      title: "基本用語"
      items:
        - term: "アルゴリズム（algorithm）"
          desc: "ある問題を解決するために，一定の手順に従って解いていけるように表現されたもの"
        - term: "フローチャート（flow chart）"
          desc: "処理手順を図記号を用いて図解したもの。流れ図ともいう"
        - term: "線形探索法"
          desc: "先頭から順番に目的のデータを探す探索アルゴリズム"
        - term: "二分探索法"
          desc: "探す範囲を半分にしながら目的のデータを探す探索アルゴリズム。データが昇順・降順に並んでいることが前提"
        - term: "選択ソート"
          desc: "残りのデータから最小（最大）値を選び，順番に並べ替える整列アルゴリズム"
    - type: table
      title: "フローチャートの主な記号（JIS X 0121）"
      headers: ["記号（形）", "名称", "内容"]
      rows:
        - ["角丸四角形", "端子", "開始と終了"]
        - ["平行四辺形", "データ", "データ入出力"]
        - ["四角形", "処理", "演算などの処理"]
        - ["台形型四角", "表示", "画面などに表示する"]
        - ["ひし形", "判断", "条件による分岐"]
        - ["五角形/台形", "ループ端", "ループの始まり・終わり"]
        - ["矢印線", "線", "データや制御の流れ"]

    - type: points
      title: "3つの制御構造"
      items:
        - "順次構造：1つの処理が終わったら，次の処理へと順に実行する"
        - "分岐構造：条件によって処理を選択し，実行する"
        - "反復構造：条件によって同じ処理を繰り返し実行する（ループ）"
      supplement:
        - "アルゴリズムはこの3つの制御構造と入出力の組み合わせで表現できる"

    - type: twocol
      title: "探索アルゴリズムの比較"
      left:
        label: "線形探索法"
        items:
          - "先頭から順番に1つずつ確認する"
          - "データの並び順は問わない"
          - "最小：1回，最大：データ数と同じ回数"
          - "例：365日の誕生日当て → 最大365回"
      right:
        label: "二分探索法"
        items:
          - "中央を確認し，大小で範囲を半分に絞る"
          - "データが昇順（または降順）に並んでいることが前提"
          - "例：365日の誕生日当て → 最大9回で終わる"
          - "データ数が多いほど効率の差が顕著になる"

    - type: points
      title: "整列アルゴリズム（選択ソート）"
      items:
        - "① 全データの中から最小値を見つけ，先頭と入れ替える"
        - "② 残りのデータの中から最小値を見つけ，左から2番目と入れ替える"
        - "③ 以下，同様に繰り返す"
        - "比較・入れ替えの回数が少ないほど，より効率のよいアルゴリズムといえる"
      supplement:
        - "他の整列アルゴリズム：バブルソート（隣どうし比較），挿入ソート，マージソート，クイックソート"

    - type: twocol
      title: "アルゴリズムの効率と「よいアルゴリズム」"
      left:
        label: "効率の評価"
        items:
          - "同じ結果でも処理の回数が異なる"
          - "データ数が増えたとき，手間がどれだけ増えるかで評価する"
          - "線形探索：データ数に比例（O(n)）"
          - "二分探索：データ数の対数に比例（O(log n)）"
      right:
        label: "よいアルゴリズムの条件"
        items:
          - "正確である：目的通りの処理ができる"
          - "効率がよい：計算回数・メモリ使用量が少ない"
          - "読みやすい：人間にとって理解しやすい"
          - "再利用できる：他の問題にも応用できる"

    - type: exercise
      title: "演習"
      basic:
        - "順次・分岐・反復の3つの制御構造を，身近な例を使って説明せよ"
        - "「自動販売機で商品を買う手順」をフローチャートで書け"
        - "5枚のカード（1,3,5,7,9）から数字5を探すとき，線形探索と二分探索それぞれ何回の比較が必要か"
      advanced:
        - "10枚のカードを選択ソートで昇順に並べ替える手順を書き，比較・入れ替えの回数を求めよ"

    - type: assignment
      task: "教科書 pp.78-81 を復習すること。フローチャートの記号を覚えておくこと"

