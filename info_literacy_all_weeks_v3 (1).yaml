      items:
        - term: "情報通信ネットワーク"
          desc: "コンピュータやスマートフォンなど，複数の機器を有線や無線の通信回線で接続し，互いに情報通信ができるようにしたもの"
        - term: "LAN（Local Area Network）"
          desc: "学校や会社などの組織内にある情報通信ネットワーク。ハブやアクセスポイント，ルータなどのネットワーク接続機器を通して構成される"
        - term: "WAN（Wide Area Network）"
          desc: "組織どうしを接続するネットワーク。通常はISP（インターネットサービスプロバイダ）が接続サービスを行っている"
        - term: "インターネット"
          desc: "WANどうしが世界規模で相互に接続された情報通信ネットワーク"
        - term: "ISP（Internet Service Provider）"
          desc: "インターネットへの接続サービスを提供する事業者。プロバイダともいう"
    - type: points
      title: "インターネットへの接続方法"
      items:
        - "■学校内などのLANに接続：ケーブルやアクセスポイントを経由して接続する。組織や学校で指定されたIPアドレスなどが設定される"
        - "■街中でWi-Fi接続：無線LANの環境の下で情報通信ができる技術・方式。組織や公衆のアクセスポイントを経由して接続する"
        - "■スマートフォンから接続：携帯電話用の通信回線を経由して接続。携帯電話会社が所有する基地局などを介して接続される"
        - "■家庭から接続：ISPと契約して光ファイバなどの接続回線を引き込み，ルータを経由して接続する"
      supplement:
        - "フリーWi-Fiにつなげるときはセキュリティに注意しよう"

    - type: twocol
      title: "2つの通信方式"
      left:
        label: "回線交換方式"
        items:
          - "通信を始める前に相手との間で通信経路を確立する"
          - "いったん経路を確立すれば安定した通信ができる"
          - "回線の障害などで経路が確立できないと通信できない"
          - "例：従来の固定電話"
      right:
        label: "パケット交換方式"
        items:
          - "情報をパケットとよばれる通信単位に小分けして送信する"
          - "あらかじめ経路を確立することなく通信を始められる"
          - "パケットが途中で失われたり，混雑の影響を受けたりすることがある"
          - "例：インターネット・電子メール・SNS"
      supplement:
        - "災害時に電話が規制されても，パケット交換方式のSNSや電子メールは使いやすい理由はここにある"

    - type: terms
      title: "プロトコルとTCP/IP"
      items:
        - term: "プロトコル"
          desc: "コンピュータどうしが相互に情報のやりとりをするために，何を使ってどのように送受信するかを決めた約束事"
        - term: "TCP/IP（Transmission Control Protocol / Internet Protocol）"
          desc: "インターネットでよく利用されるプロトコル。基本ソフトウェアやアプリケーションに依存せず共通の役割を果たす"
        - term: "TCP（トランスポート層）"
          desc: "送受信のデータの順序を整え，欠落や重複がないか確認し，データ通信の信頼性を高めるプロトコル。パケットが喪失した場合，再送を要求する"
        - term: "IP（インターネット層）"
          desc: "異なる組織の間でデータをやりとりできるようにするプロトコル。データの行き先と経路を決める"
    - type: table
      title: "ネットワークの階層構造"
      headers: ["層", "名称", "機能", "プロトコルの例"]
      rows:
        - ["4層", "アプリケーション層", "アプリケーションに応じた通信の形式や手順を定める", "SMTP・HTTP・DNS"]
        - ["3層", "トランスポート層", "パケットが喪失しないで届くことを保証する", "TCP・UDP"]
        - ["2層", "インターネット層", "データの行き先と経路を決める", "IP"]
        - ["1層", "ネットワークインタフェース層", "接続されたコンピュータどうしが誤りなくデータ転送する手順を提供する", "イーサネット"]
      note: "データは4層から入り1層でケーブルや無線を通って，また4層に戻る"

    - type: points
      title: "IPアドレスとMACアドレス"
      items:
        - "IPアドレス：インターネットに接続されたコンピュータが持つ固有の番号。32ビットで表され，8ビットずつに区切って10進法で表記する"
        - "例：11001010 11010110 11011000 00001010 → 202.214.216.10"
        - "MACアドレス：ネットワークインタフェース層でハードウェアを特定する番号"
        - "インターネット層ではIPアドレス，ネットワークインタフェース層ではMACアドレスが使われる"
      supplement:
        - "現在主に使用されているIPv4は32ビット。接続機器の急増によりIPアドレスが不足し，128ビットのIPv6への移行が進んでいる"

    - type: points
      title: "通信速度と5G"
      items:
        - "通信速度は1秒あたりに送信するデータ量を用いてbps（bits per second）で表される"
        - "移動通信サービスの第5世代移動通信システム（5G）はおよそ10Gbpsの通信速度"
        - "5Gはエンターテインメントだけでなく，遠隔医療や自動運転のサポートなど，さまざまなサービスを実現している"
        - "1Gbps = 10⁹bps"

    - type: exercise
      title: "演習"
      basic:
        - "LANとWANとインターネットの関係を説明せよ"
        - "回線交換方式とパケット交換方式の違いを説明せよ。また，災害時にSNSが使いやすい理由をこの違いと関連付けて述べよ"
        - "IPアドレス「11000000 10101000 00000001 00000001」を10進法で表せ"
      advanced:
        - "TCP/IPの4層構造のそれぞれの役割を説明し，WebページをURLで開くときに各層がどのように働くか述べよ"

    - type: assignment
      task: "教科書 pp.104-107 を復習すること。次週はインターネットの利用と安全な仕組みを学ぶ（pp.108-111）"

---
# ===== 後期第5週 =====

---
# ===== 後期5週 =====
- num: "後期5"
  title: "インターネットの仕組みと安全な利用"
  subtitle: "Theory 42-43 / pp.108-111"
  textbook: "pp.108-111"
  next_topic: "情報システムの役割と信頼性"
  next_pages: "pp.112-117"
  summary:
    - "URLの構造・DNS・クライアントサーバの仕組みを理解した"
    - "電子メールの送受信プロトコル（SMTP・POP3・IMAP）を学んだ"
    - "共通鍵・公開鍵暗号とファイアウォールによる安全な通信を把握した"
  goals:
    - "インターネットの仕組みを理解し，安全利用のための注意点を説明できる"

  slides:
    - type: title
      flow:
        - "クライアントサーバシステムとWWW"
        - "URLの構造とドメイン名・DNS"
        - "電子メールの仕組み"
        - "ファイアウォール"
        - "暗号化通信（共通鍵・公開鍵）"

    - type: terms
      title: "基本用語"
      items:
        - term: "サーバ（server）"
          desc: "インターネットでWebページの閲覧などの際に，それぞれの役割に応じたサービスを提供するコンピュータ"
        - term: "クライアント（client）"
          desc: "サーバに対してサービスを要求し，サービスを受ける利用者のコンピュータ"
        - term: "クライアントサーバシステム"
          desc: "サーバとクライアントが連携して機能するシステム"
        - term: "WWW（World Wide Web）"
          desc: "インターネットで現在最も利用されている分散情報システム。「世界中に張り巡らされたクモの巣」が語源"
        - term: "HTML（HyperText Markup Language）"
          desc: "Webページを記述するための言語"
        - term: "URL（Uniform Resource Locator）"
          desc: "Webページなどの情報が格納されている場所と通信方式を示した文字列"
    - type: points
      title: "URLの構造"
      items:
        - "例：http://www.example.ed.jp/index.html"
        - "通信方式（スキーム）：http（通常のWeb）／https（暗号通信のWeb）／ftp（ファイル転送）など"
        - "サーバ名：www など"
        - "組織名・組織種別・国名：example.ed.jp（教育機関・日本）など"
        - "パス名：情報が収められているフォルダ名やファイル名"
      supplement:
        - "組織種別の例：ac（大学・学校法人）/ co（企業）/ go（日本政府機関）/ ed（教育機関・小中高）"

    - type: terms
      title: "DNSと電子メール"
      items:
        - term: "DNS（Domain Name System）"
          desc: "ドメイン名という文字列からIPアドレスへの変換を行う仕組み。国や組織ごとに階層的に設置されたDNSサーバが担っている"
        - term: "ドメイン名"
          desc: "数字の列で表されるIPアドレスは人間には記憶しにくいため，対応させた文字列。例：www.kantei.go.jp → 202.214.216.10"
        - term: "SMTP（Simple Mail Transfer Protocol）"
          desc: "電子メールを送信するときに使われるプロトコル"
        - term: "POP（Post Office Protocol）"
          desc: "メールボックスのあるメールサーバから電子メールを受け取るプロトコル"
        - term: "IMAP（Internet Message Access Protocol）"
          desc: "メールサーバ上のメールを管理・参照するプロトコル。サーバにメールを残したまま複数の端末で利用できる"
    - type: points
      title: "DNSの働き（Webアクセスの流れ）"
      items:
        - "① ブラウザにURL（ドメイン名）を入力する"
        - "② DNSサーバにIPアドレスを問い合わせる"
        - "③ DNSサーバがIPアドレスを返答する"
        - "④ 取得したIPアドレスのWebサーバにアクセスする"
        - "⑤ WebサーバがHTMLデータを返送し，ブラウザが画面に表示する"

    - type: terms
      title: "ファイアウォール"
      items:
        - term: "ファイアウォール"
          desc: "ネットワークの出入り口で許されたデータのみを通過させ，それ以外のアクセスを拒絶する仕組み。情報の機密性を守ると同時に，コンピュータウイルスによる障害を防ぎ，可用性を守る"
        - term: "パケットフィルタリング方式"
          desc: "インターネットとLANをつなぐ接続点で，プロトコルの種類や送信元のIPアドレスなどから，パケットごとに通過か遮断かを判断する方式"
        - term: "プロキシサーバ"
          desc: "クライアントの代わりにWebページにアクセスし，データを中継する代理サーバ。セキュリティ機能やキャッシュ機能がある"
    - type: twocol
      title: "暗号化の2つの方式"
      left:
        label: "共通鍵暗号方式"
        items:
          - "暗号化と復号で同じ鍵を使う（秘密鍵暗号方式ともいう）"
          - "鍵が1つなので仕組みが単純で，処理速度が速い"
          - "事前に安全な方法で送信先に鍵を渡さなければならない"
          - "送り手と受け手以外に鍵が知られると，暗号化の効果がなくなる"
      right:
        label: "公開鍵暗号方式"
        items:
          - "対となる2つの鍵（公開鍵・秘密鍵）を使い，暗号化と復号をそれぞれ行う"
          - "公開鍵で暗号化したデータは，秘密鍵でしか復号できない"
          - "公開鍵は誰でも入手できるが，秘密鍵は本人のみが持つ"
          - "通信相手への鍵の受け渡しを秘密にする必要がなく，インターネット上でも安全に利用できる"
      supplement:
        - "SSL/TLSはWebの通信を暗号化する技術。従来のURLはhttp://で始まるが，SSL/TLSによる通信ではhttps://になる"

    - type: notice
      title: "安全なインターネット利用のポイント"
      items:
        - "URLを確認する：アドレスバーに「https://」と鍵マークがあるか確認する"
        - "フリーWi-Fiでは個人情報の入力を避ける（パケットは盗み見られる可能性がある）"
        - "ファイアウォールとパーソナルファイアウォールの二重のセキュリティが求められる"
        - "不審なメール・リンクは開かない（フィッシング詐欺に注意）"

    - type: exercise
      title: "演習"
      basic:
        - "URLの「https://www.example.ed.jp/index.html」を構成要素（スキーム・サーバ名・組織名・組織種別・国名・パス名）に分解して説明せよ"
        - "DNSの役割を電話帳に例えて説明せよ"
        - "共通鍵暗号方式と公開鍵暗号方式の違いを，鍵の受け渡し方法に着目して説明せよ"
      advanced:
        - "電子メールを送信してから受信するまでの流れを，SMTP・POP・メールサーバの語句を使って説明せよ"

    - type: assignment
      task: "教科書 pp.108-111 を復習すること。次週は情報システムの役割と信頼性を学ぶ（pp.112-117）"

---
# ===== 後期第6週 =====

---
# ===== 後期6週 =====
- num: "後期6"
  title: "情報システムの役割と信頼性"
  subtitle: "Theory 44-46 / pp.112-117"
  textbook: "pp.112-117"
  next_topic: "データベースとデータ管理の基礎"
  next_pages: "pp.118-121"
  summary:
    - "情報システムの種類（集中・分散・移動体）と役割を理解した"
    - "電子マネー・オープンデータなど身近な情報システムを学んだ"
    - "稼働率・RAID・バックアップなど信頼性確保の手法を把握した"
  goals:
    - "情報システムの役割と，信頼性確保の重要性を説明できる"

  slides:
    - type: title
      flow:
        - "情報システムのサービスと種類"
        - "情報システムと通貨（電子マネー・仮想通貨）"
        - "さまざまな情報システム（集中・分散・移動体）"
        - "オープンデータ"
        - "情報システムの信頼性（バックアップ・RAID・稼働率）"

    - type: terms
      title: "情報システムの基本用語"
      items:
        - term: "情報システム"
          desc: "収集されたデータを利用可能な形に処理し，必要とする場所へ伝達する仕組み。さまざまなハードウェア・ソフトウェア・通信回線・サービスが組み合わされている"
        - term: "POSシステム（Point Of Sales system）"
          desc: "商品を販売した時点でそのデータを収集・管理するシステム。販売管理・在庫管理・生産管理・配送管理などが連携している"
        - term: "GPS（Global Positioning System）"
          desc: "複数の衛星の位置情報から現在位置を算出し，バスなどの運行状況通知などに利用できるシステム"
        - term: "トレーサビリティシステム"
          desc: "商品の製造番号や電子タグを取り付けることで，生産者から消費者までの商品を追跡可能にする仕組み"
    - type: table
      title: "情報システムの種類"
      headers: ["種類", "説明", "例"]
      rows:
        - ["計算システム", "金銭の出納の集計や気象データの解析など，計算処理を中心とした業務に使われる", "気象予測・統計処理"]
        - ["通信システム", "気象データの収集や遠隔地とのテレビ会議など，高速で安定したデータ通信を行う業務に使われる", "気象衛星・遠隔医療"]
        - ["制御システム", "工場の生産設備を自動運転する業務などに使われる", "FA（ファクトリーオートメーション）"]

    - type: twocol
      title: "情報システムと通貨"
      left:
        label: "電子マネー"
        items:
          - "貨幣価値をデジタルデータで表現したもの"
          - "IC型：カードやスマートフォンのICチップに金額データを記録（交通系・流通系）"
          - "ネットワーク型：インターネット上で金銭情報を管理するものや，プリペイドカードなど"
          - "IC型の電子マネーにはRFID（非接触型）の技術が使われている"
      right:
        label: "仮想通貨（暗号資産）"
        items:
          - "インターネット上で新たに定義されたデジタル化された通貨"
          - "既存の各国の貨幣価値と交換でき，物品・サービスの対価として使用できる"
          - "ブロックチェーンという技術で，銀行のような機関を経由せずに貨幣価値を移せる"
          - "公的な発行主体や管理者の裏付けなしに流通しているものがあり，価値が暴落・消失することがある"

    - type: table
      title: "情報システムの処理形態（3種類）"
      headers: ["種別", "説明", "特徴"]
      rows:
        - ["集中情報システム", "中央に大型・中型の汎用コンピュータを設置し，全てのデータを集中管理する", "機密性・完全性が保たれやすい。データ量増加による負荷集中・故障時のリスクがある"]
        - ["分散情報システム", "複数の小型コンピュータを相互に接続し，データを共有しながら業務を分担して処理する。クライアントサーバシステムが代表例", "負荷が分散されて高速化が望める。セキュリティが低下したりデータの一貫性を保つのが難しかったりする"]
        - ["移動体情報システム", "携帯情報端末を用い，無線技術によって移動中も相互利用を可能にする", "屋内と屋外で別々の回線を切り替えて運用できる柔軟性がある"]

    - type: points
      title: "オープンデータ"
      items:
        - "国や地方公共団体，民間企業が所有しているデータのうち，次の①〜③に当てはまるように公開されたものをオープンデータという"
        - "① 営利目的・非営利目的を問わず二次利用可能なルールが適用されたもの"
        - "② 機械判読に適したもの"
        - "③ 無償で利用できるもの"
        - "AEDや消火器の設置場所，地域バスの運行ルートなどを公開することで，それらを活用したサービスやアプリが多数登場している"
      supplement:
        - "クリエイティブ・コモンズ（CC）：著作者が使用許諾の条件を積極的に開示することで，著作物を再利用されやすくする仕組み"

    - type: points
      title: "情報システムの信頼性（1）：バックアップとRAID"
      items:
        - "情報システムは稼働を始めると容易に停止することができない。そのため冗長化（二重化・多重化）といった方策が取られる"
        - "バックアップ：データを記録した媒体が破損して失われないよう，一定時間で複製を行う方法"
        - "フルバックアップ：全てのデータを複製する"
        - "差分バックアップ：前回のフルバックアップからの変更分を複製する"
        - "増分バックアップ：前回のバックアップからの変更分のみを複製する（容量が少なく済む）"
        - "RAID：複数のドライブを組み合わせて仮想的に1台の装置に見立てて運用する技術。耐故障性を高められる"

    - type: points
      title: "情報システムの信頼性（2）：稼働率とフェールセーフ"
      items:
        - "稼働率：情報システムが正常に動作している時間の割合を表す平均的な指標"
        - "平均故障間隔（MTBF）：システムが稼働を開始してから故障するまでの平均時間"
        - "平均修理時間（MTTR）：故障が発生してから修理が完了するまでの平均時間"
        - "稼働率 = MTBF ÷ （MTBF + MTTR）"
        - "フェールセーフ：機器が故障したとき，安全側に動作するように設計すること（例：信号が消えたら赤になる）"
        - "フールプルーフ：誤操作しても危険が起きないようにする設計（例：電池を逆に入れられない形状）"

    - type: exercise
      title: "演習"
      basic:
