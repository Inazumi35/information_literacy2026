          - "人間の脳の神経細胞（ニューロン）を模倣した構造"

    - type: terms
      title: "ニューラルネットワークの基本"
      items:
        - term: "ノード"
          desc: "計算を行う単位（ニューロンに相当）"
        - term: "重み（weight）"
          desc: "ノード間の結合の強さを表す数値。学習によって調整される"
        - term: "層（layer）"
          desc: "ノードの集まり。入力層・隠れ層・出力層から構成される"
        - term: "今日のモデル構造"
          desc: "入力784 → 隠れ層128 → 隠れ層64 → 出力10（総パラメータ数：109,386個）"

    - type: twocol
      title: "活性化関数"
      left:
        label: "ReLU（レルー）"
        items:
