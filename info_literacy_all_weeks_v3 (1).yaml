          - "隠れ層でよく使われる"
          - "計算が速い"
          - "f(x) = max(0, x)"
      right:
        label: "Softmax（ソフトマックス）"
        items:
          - "出力を確率に変換する（合計が1になる）"
          - "出力層でよく使われる"
          - "各クラスの確率を出力"
          - "例：数字「7」である確率 95%"

    - type: points
      title: "学習の仕組み：バックプロパゲーション"
      items:
